# This is a Databricks asset bundle definition for jd_dabs_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: jd_dabs_project

include:
  - resources/*.yml

variables:
  main_catalog:
    description: Default Catalog to use
    default: development-catalog
  main_schema:
    description: Default Schema to use
    default: development_schema
  warehouse_id:
    description: SQL Warehouse running dashboard
    lookup:
      warehouse: 'Juan Diego Warehouse'


targets:
  # The 'dev' target, for development purposes. This is the default target in the project. ADDING TEXT 
    
  dev:
    # We use 'mode: development' to indicate this is a personal development copy:
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default
    # - The 'development' mode is used for Delta Live Tables pipelines
    mode: development
    default: true
    variables:
      main_catalog: development-catalog
      main_schema: development_schema
    workspace:
      host: https://adb-7405606116379009.9.azuredatabricks.net/

  ## Optionally, there could be a 'staging' target here.
  ## (See Databricks docs on CI/CD at https://docs.databricks.com/dev-tools/bundles/index.html. 
  #
  # staging:
  #   workspace:
  #     host: https://adb-1728909964136821.1.azuredatabricks.net

  # The 'prod' target, used for production deployment.
  prod:
    # We use 'mode: production' to indicate this is a production deployment. 
    # Doing so enables strict verification of the settings below.
    mode: production
    variables:
      main_catalog: production_catalog
      main_schema: production_schema
    workspace:
      host: https://adb-7405611583094007.7.azuredatabricks.net/
      # We always use /Users/juandiego.vargasrosales@databricks.com for all resources to make sure we only have a single copy.
      # If this path results in an error, please make sure you have a recent version of the CLI installed.
      root_path: /Users/juandiego.vargasrosales@databricks.com/.bundle/${bundle.name}/${bundle.target}
    run_as:
      # This runs as juandiego.vargasrosales@databricks.com in production. We could also use a service principal here,
      # see https://docs.databricks.com/dev-tools/bundles/permissions.html.
      user_name: juandiego.vargasrosales@databricks.com
